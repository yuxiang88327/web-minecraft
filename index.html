<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Web Minecraft</title>
    <meta name="description" content="基于网页的我的世界风格体素游戏">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="blocker">
        <div id="instructions">
            <h1>Web Minecraft</h1>
            <p class="subtitle">基于网页的体素沙盒游戏</p>
            <div class="controls-grid">
                <div class="control-item"><kbd>W A S D</kbd><span>移动</span></div>
                <div class="control-item"><kbd>空格</kbd><span>跳跃</span></div>
                <div class="control-item"><kbd>鼠标</kbd><span>视角</span></div>
                <div class="control-item"><kbd>Shift</kbd><span>加速</span></div>
                <div class="control-item"><kbd>左键</kbd><span>破坏方块</span></div>
                <div class="control-item"><kbd>右键</kbd><span>放置 / 打开工作台</span></div>
                <div class="control-item"><kbd>1-9 / 0 / -</kbd><span>选择方块</span></div>
                <div class="control-item"><kbd>滚轮</kbd><span>切换方块</span></div>
                <div class="control-item"><kbd>E</kbd><span>装备面板</span></div>
            </div>
            <div class="mp-join-row">
                <input id="player-name" type="text" maxlength="16" placeholder="输入你的名字" autocomplete="off">
                <button id="join-btn" type="button">进入多人世界</button>
            </div>
            <p id="join-hint" class="click-hint">先输入名字，再点击进入（无需注册登录）</p>
        </div>
    </div>
    <div id="crosshair">+</div>
    <div id="debug-info"></div>
    <div id="multiplayer-hud">👥 在线 <span id="mp-online-count">1</span> | <span id="mp-status">未连接</span></div>
    <div id="touch-ui" aria-hidden="true">
        <div id="touch-joystick" class="touch-panel">
            <div class="touch-stick-base">
                <div id="touch-stick-thumb"></div>
            </div>
        </div>
        <div id="touch-look" class="touch-panel"></div>
        <div id="touch-actions">
            <button id="touch-break" type="button" class="touch-btn touch-btn-danger">拆</button>
            <button id="touch-place" type="button" class="touch-btn touch-btn-primary">放</button>
            <button id="touch-jump" type="button" class="touch-btn">跳</button>
            <button id="touch-sprint" type="button" class="touch-btn">跑</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>

</html>
